name: Build and Release OpenClaw Installer

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # 必须开启写入权限，否则无法自动创建 Release

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 获取完整历史以计算版本号

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Single File
      # 优化点：添加了单文件压缩、ReadyToRun 预编译和去除符号文件，使 exe 更小更纯净
      run: |
        dotnet publish OpenClawInstaller.csproj `
          -c Release `
          -r win-x64 `
          --self-contained false `
          -p:PublishSingleFile=true `
          -p:PublishReadyToRun=true `
          -p:Deterministic=true `
          -o ./publish_output

    - name: Generate Version Tag
      id: tag
      shell: bash
      run: echo "release_tag=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

    - name: Create Release and Upload
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: OpenClaw Installer Auto-Build ${{ steps.tag.outputs.release_tag }}
        body: |
          这是由 GitHub Actions 自动生成的纯净构建版本。
          - 源码来源: ${{ github.server_url }}/${{ github.repository }}
          - 构建时间: ${{ steps.tag.outputs.release_tag }}
          - 安全提示: openclaw运行后可以直接访问您的全部文件，如果您对安全有相关的问题担忧，可以在虚拟机中运行本软件将openclaw部署至虚拟机，或者您可以使用沙盒软件来运行推荐 https://github.com/sandboxie-plus/Sandboxie/releases
          - **注**：本程序只会写入您指定的安装路径，安装完成后即可关闭或者删除，对后续使用openclaw没有任何影响。
        draft: false
        prerelease: false
        files: ./publish_output/OpenClawInstaller.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifact (Backup)
      uses: actions/upload-artifact@v4
      with:
        name: OpenClawInstaller-win-x64
        path: ./publish_output/OpenClawInstaller.exe

